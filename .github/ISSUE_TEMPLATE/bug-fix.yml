name: Bug / Fix
description: Report a bug or propose a fix with maintenance justification
labels:
  - bug
body:
  - type: dropdown
    id: maintenance-justification
    attributes:
      label: Maintenance justification
      description: Select at least one reason this fix is justified.
      multiple: true
      options:
        - Breaks core functionality
        - Causes recurring API or operational cost
        - Creates severe reliability or performance problems
        - Is likely to make users abandon the extension
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the problem?
    validations:
      required: true
  - type: textarea
    id: smallest-fix
    attributes:
      label: Smallest production-safe fix
      description: Describe the minimum change that resolves the issue without breaking working behavior.
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: What is explicitly out of scope? Delete examples that do not apply.
      value: |
        - Refactoring unrelated code
        - Speculative abstractions
        - UI polish or cleanup for aesthetics alone
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What must be true for this issue to be complete?
      placeholder: |
        1.
    validations:
      required: true
  - type: textarea
    id: validation-steps
    attributes:
      label: Validation steps
      description: How will we verify the fix works?
      placeholder: |
        1.
    validations:
      required: true
