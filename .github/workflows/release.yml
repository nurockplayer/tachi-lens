name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'release/v0.1.0-trigger'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Package extension
        run: |
          cd dist && zip -r ../tachi-lens.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            TARGET="${GITHUB_SHA}"
          else
            TAG="v0.1.0"
            TARGET="35ac34d8aa700c9303485c688ce9104768080d3b"
          fi

          gh release create "$TAG" \
            --target "$TARGET" \
            --title "tachi-lens $TAG" \
            --generate-notes \
            tachi-lens.zip
