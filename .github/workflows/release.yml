name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Validate release metadata
        env:
          TAG: ${{ github.ref_name }}
        run: |
          export TAG_VERSION="${TAG#v}"
          node <<'NODE'
          const fs = require('node:fs')

          const expected = process.env.TAG_VERSION
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'))
          const manifestDisplayVersion = manifest.version_name ?? manifest.version

          if (packageJson.version !== expected) {
            throw new Error(
              `Tag ${expected} does not match package.json version ${packageJson.version}`,
            )
          }
          if (manifestDisplayVersion !== expected) {
            throw new Error(
              `Tag ${expected} does not match manifest display version ${manifestDisplayVersion}`,
            )
          }
          NODE

      - run: pnpm build

      - name: Package extension
        run: |
          cd dist && zip -r ../tachi-lens.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          NOTES_FILE="docs/releases/${TAG}.md"
          RELEASE_ARGS=(--verify-tag)

          if [[ "$TAG" == *-* ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi

          if [[ -f "$NOTES_FILE" ]]; then
            RELEASE_ARGS+=(--notes-file "$NOTES_FILE")
          else
            RELEASE_ARGS+=(--generate-notes)
          fi

          gh release create "$TAG" \
            --title "tachi-lens $TAG" \
            "${RELEASE_ARGS[@]}" \
            tachi-lens.zip
