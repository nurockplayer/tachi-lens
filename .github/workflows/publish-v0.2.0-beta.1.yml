name: Publish v0.2.0-beta.1

on:
  push:
    branches:
      - release/publish-v0.2.0-beta.1
    paths:
      - .release-trigger-v0.2.0-beta.1

permissions:
  contents: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release metadata
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const expected = '0.2.0-beta.1'
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'))
          const displayVersion = manifest.version_name ?? manifest.version

          if (packageJson.version !== expected) {
            throw new Error(`package.json version ${packageJson.version} does not match ${expected}`)
          }
          if (displayVersion !== expected) {
            throw new Error(`manifest display version ${displayVersion} does not match ${expected}`)
          }
          if (!fs.existsSync('docs/releases/v0.2.0-beta.1.md')) {
            throw new Error('release notes are missing')
          }
          NODE

      - name: Run checks
        run: |
          pnpm lint
          pnpm test
          pnpm build

      - name: Package extension
        run: |
          cd dist
          zip -r ../tachi-lens.zip .

      - name: Publish and verify GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG='v0.2.0-beta.1'

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --target main \
              --title "tachi-lens $TAG" \
              --prerelease \
              --notes-file "docs/releases/$TAG.md" \
              tachi-lens.zip
          fi

          RELEASE_JSON="$(gh release view "$TAG" --json tagName,name,isPrerelease,url,assets)"
          echo "$RELEASE_JSON" | jq -e '
            .tagName == "v0.2.0-beta.1" and
            .isPrerelease == true and
            ([.assets[].name] | index("tachi-lens.zip") != null)
          '

          RELEASE_URL="$(echo "$RELEASE_JSON" | jq -r '.url')"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          gh issue comment 76 --body "✅ Published and verified **$TAG** as a GitHub prerelease.\n\n- Release: $RELEASE_URL\n- Asset verified: \`tachi-lens.zip\`\n- Source commit: \`7c115a04e5ff89a71d3382e6adca48b757f3e7dd\`\n- Verification workflow: $RUN_URL\n- Automated checks: install, lint/typecheck, full test suite, production build"
          gh issue close 76 --reason completed
